  tags: ["scRNA-seq", "Cell Atlas", "Mouse"]

- title: "How Zinc Supplements Disarm Pathogenic <em>E. coli</em>"
  summary: "Zinc supplements can treat infantile diarrhea, but how? We show that micromolar zinc triggers envelope stress in enteropathogenic <em>E. coli</em>, activating the alternate sigma factor RpoE, which in turn suppresses virulence gene expression through multiple mechanisms."
  authors: "<strong>Yuan Xue</strong>, Jossef Osborn, Anand Panchal, Jay L. Mellies."
  venue: "Applied and Environmental Microbiology, 2015"
  image: "assets/images/research/2015_AEM_YX.png"
  pdf: "https://aem.asm.org/content/81/11/3766/article-info"
  tags: ["Microbiology", "Pathogens", "Gene Regulation"]

- title: "How Autophagy Switches On Its Own Degradation Machinery"
  summary: "Lysosomes execute autophagy, but does the autophagic process itself regulate lysosomal function? We dissect a dual activation mechanism involving mTORC1 suppression and autophagosome-lysosome fusion that upregulates lysosomal activity during autophagy."
  authors: "Jing Zhou, Shi-Hao Tan, Valerie Nicolas, Chantal Bauvy, Nai-Di Yang, Jianbin Zhang, <strong>Yuan Xue</strong>, Patrice Codogno, Han-Ming Shen."
  venue: "Cell Research, 2013"
  pdf: "https://www.nature.com/articles/cr201311"
  tags: ["Cell Biology", "Autophagy"]
